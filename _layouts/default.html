<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.scss' | relative_url }}">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="{{ '/' | relative_url }}" class="nav__name">Ben Perche</a>
      <button class="nav__toggle" aria-label="Toggle menu" onclick="this.nextElementSibling.classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a></li>
        <li><a href="{{ '/repertoire/' | relative_url }}" {% if page.url contains '/repertoire' %}class="active"{% endif %}>Repertoire</a></li>
        <li><a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a></li>
        <!-- <li><a href="{{ '/contact/' | relative_url }}" {% if page.url contains '/contact' %}class="active"{% endif %}>Contact</a></li> -->
      </ul>
    </div>
  </nav>

  <!-- Page content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container--wide">
      <div class="footer" style="max-width:1100px;margin:0 auto;">
        <span>&copy; {{ 'now' | date: "%Y" }} Ben Perche</span>
        <ul class="footer__links">
          <li><a href="{{ '/about/' | relative_url }}">About</a></li>
          <li><a href="{{ '/repertoire/' | relative_url }}">Repertoire</a></li>
          <li><a href="{{ '/projects/' | relative_url }}">Projects</a></li>
          <!-- <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li> -->
        </ul>
      </div>
    </div>
  </footer>

</body>
</html>
